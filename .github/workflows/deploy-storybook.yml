name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (덮어쓰기 충돌 방어)
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Storybook
        run: npm run build-storybook
        env:
          # https://box3101.github.io/ispark-ui/ 경로에 맞춰 자산 base path 설정
          BASE_URL: '/ispark-ui/'

      - uses: actions/configure-pages@v5
        with:
          # Pages가 아직 활성화 안 됐으면 자동 활성화
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
